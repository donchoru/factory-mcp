services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: factory-open-webui
    ports:
      - "3006:8080"
    volumes:
      - open-webui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data:
